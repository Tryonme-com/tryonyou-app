name: CI — Build

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build Vite/React app
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tryonyou-v100

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tryonyou-v100/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_JULES_API_KEY: ${{ secrets.VITE_JULES_API_KEY }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
          VITE_STRIPE_LINK_SOVEREIGNTY_4_5M: ${{ secrets.VITE_STRIPE_LINK_SOVEREIGNTY_4_5M }}
          VITE_STRIPE_LINK_SOVEREIGNTY_98K: ${{ secrets.VITE_STRIPE_LINK_SOVEREIGNTY_98K }}
          VITE_SHOP_DOMAIN: ${{ secrets.VITE_SHOP_DOMAIN }}
          VITE_SHOP_VARIANT: ${{ secrets.VITE_SHOP_VARIANT }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: tryonyou-v100/dist/
          retention-days: 7
