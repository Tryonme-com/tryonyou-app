# CI — Protocolo Soberanía V10 Omega (v10.17)
# Alineado con deployall local: Python tests → prebuild → tsc → Vite build.
# Deploy Vercel solo en main si existe VERCEL_TOKEN.
# Patente: PCT/EP2025/067317 — Bajo Protocolo de Soberanía V10 - Founder: Rubén

name: CI/CD — v10.17

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

  build:
    name: Vite + typecheck
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install npm
        run: npm ci --ignore-scripts || npm install
      - name: Firebase applet (prebuild)
        run: node scripts/assert-firebase-applet.mjs
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Vite build
        run: npx vite build

  deploy:
    name: Vercel (prod, solo con token)
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Vercel CLI
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npm i -g vercel@latest
      - name: Pull Vercel environment
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Vercel build
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        id: vercel
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Summary
        if: ${{ secrets.VERCEL_TOKEN != '' && success() }}
        run: |
          echo "## Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.vercel.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Rama: v10.17 / Protocolo Soberanía V10" >> "$GITHUB_STEP_SUMMARY"
      - name: Sin VERCEL_TOKEN
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: 'echo "Deploy Vercel omitido: define el secreto VERCEL_TOKEN en el repositorio."'
