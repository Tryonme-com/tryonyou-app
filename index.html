    <script>
(function () {
  var path = (window.__TRYONYOU_MIRROR_DIGITAL_PATH__ || "/api/mirror_digital_event");
  function postMirror(ev, meta) {
    return fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ event: ev, source: "index_html_shell", meta: meta || {} })
    }).catch(function () {});
  }
  function writePayStatus(next) {
    var statusEl = document.getElementById("tryonyou-pay-status");
    if (statusEl) statusEl.textContent = next;
  }
  function resolveStripeHref(el) {
    var current = (el.getAttribute("data-stripe-href") || "").trim();
    if (window.empireFinalProtocol && typeof window.empireFinalProtocol.resolveStripeHref === "function") {
      current = window.empireFinalProtocol.resolveStripeHref(current);
    } else if (!current) {
      current = (window.__DIVINEO_CHECKOUT_URL__ || "").trim();
    }
    if (current) el.setAttribute("data-stripe-href", current);
    return current;
  }
  function appendFlowToken(url, flowToken) {
    if (!url || !flowToken) return url;
    try {
      var u = new URL(url);
      if (!u.searchParams.get("flow_token")) u.searchParams.set("flow_token", flowToken);
      return u.toString();
    } catch (err) {
      return url;
    }
  }
  function wire(el) {
    var ev = el.getAttribute("data-mirror-event");
    if (!ev) return;
    el.addEventListener("click", async function (e) {
      var isPayButton = el.id === "tryonyou-pay-button";
      var href = resolveStripeHref(el);
      if (href) e.preventDefault();
      void postMirror(ev, { label: (el.textContent || "").trim().slice(0, 200) });
      if (!isPayButton) {
        if (href) window.location.href = href;
        return;
      }
      if (!href) {
        writePayStatus("Lien Stripe manquant");
        return;
      }
      writePayStatus("Pau Emotional Intelligence: preparation...");
      var flowToken = "";
      if (window.empireFinalProtocol && typeof window.empireFinalProtocol.executePauSnap === "function") {
        try {
          var snapResult = await window.empireFinalProtocol.executePauSnap({ trigger: "tryonyou-pay-button" });
          flowToken = (snapResult && snapResult.flowToken) || "";
        } catch (err) {}
      }
      if (window.empireFinalProtocol && typeof window.empireFinalProtocol.registerPaymentIntent === "function") {
        await window.empireFinalProtocol.registerPaymentIntent({
          flowToken: flowToken,
          checkoutUrl: href,
          buttonId: "tryonyou-pay-button",
          source: "index_html_shell",
        });
      }
      writePayStatus("Redirection Stripe en cours...");
      window.location.href = appendFlowToken(href, flowToken);
    });
    el.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); el.click(); }
    });
  }
  document.querySelectorAll("[data-mirror-event]").forEach(wire);
  var syncStripeHref = function () {
    var payButton = document.getElementById("tryonyou-pay-button");
    if (!payButton) return;
    resolveStripeHref(payButton);
  };
  syncStripeHref();
  window.setTimeout(syncStripeHref, 1500);
})();
    </script>
    <script>
(function(){
var GOLD="#D4AF37";
var ALPHA=0.22;
var ema=0.5;
function dist2(a,b){var dx=a.x-b.x;var dy=a.y-b.y;return Math.hypot(dx,dy);}
function computeElasticityRatio(lm){if(!lm||lm.length<25)return 0.5;var s=dist2(lm[11],lm[12]);var h=dist2(lm[23],lm[24]);return s/Math.max(h,1e-6);}
function fabricFitComparator(e,b){b=b||[0.82,1.18];if(e>=b[0]&&e<=b[1])return "aligned";if(e<b[0])return "drape_bias";return "tension_bias";}
function verdictToUiLabel(v){if(v==="aligned")return "Cohérence drape — tenue";if(v==="drape_bias")return "Préférence drapé";if(v==="tension_bias")return "Préférence tenue";return "Analyse en cours";}
function drawConn(ctx,lm,pairs,w,h,c){ctx.strokeStyle=c;ctx.lineWidth=2;for(var i=0;i<pairs.length;i++){var a=pairs[i][0],b=pairs[i][1];var pa=lm[a],pb=lm[b];if(!pa||!pb)continue;ctx.beginPath();ctx.moveTo(pa.x*w,pa.y*h);ctx.lineTo(pb.x*w,pb.y*h);ctx.stroke();}}
function drawLm(ctx,lm,w,h,c){ctx.fillStyle=c;for(var i=0;i<lm.length;i++){var p=lm[i];if(p.visibility!==undefined&&p.visibility<0.45)continue;ctx.beginPath();ctx.arc(p.x*w,p.y*h,2,0,Math.PI*2);ctx.fill();}}
var videoElement=document.getElementById("input_video");
var canvasElement=document.getElementById("output_canvas");
var canvasCtx=canvasElement.getContext("2d");
if(!videoElement||!canvasCtx)return;
var PoseCtor=window.Pose;
var CameraCtor=window.Camera;
var POSE_CONNECTIONS=window.POSE_CONNECTIONS;
if(!PoseCtor||!CameraCtor||!POSE_CONNECTIONS)return;
function resize(){canvasElement.width=window.innerWidth;canvasElement.height=window.innerHeight;}
window.addEventListener("resize",resize);
resize();
function onResults(results){
var w=canvasElement.width,h=canvasElement.height;
canvasCtx.save();
canvasCtx.clearRect(0,0,w,h);
if(results.image)canvasCtx.drawImage(results.image,0,0,w,h);
if(results.poseLandmarks&&results.poseLandmarks.length>=33){
var ratio=computeElasticityRatio(results.poseLandmarks);
ema=ALPHA*ratio+(1-ALPHA)*ema;
var v=fabricFitComparator(ema);
var label=verdictToUiLabel(v);
try{window.dispatchEvent(new CustomEvent("tryonyou:fit",{detail:{label:label}}));}catch(e){}
drawConn(canvasCtx,results.poseLandmarks,POSE_CONNECTIONS,w,h,GOLD);
drawLm(canvasCtx,results.poseLandmarks,w,h,GOLD);
}
canvasCtx.restore();
}
var pose=new PoseCtor({locateFile:function(file){return "https://cdn.jsdelivr.net/npm/@mediapipe/pose/"+file;}});
pose.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:0.5});
pose.onResults(onResults);
var camera=new CameraCtor(videoElement,{
  onFrame:function(){pose.send({image:videoElement});},
  onError:function(err){console.warn("Camera feed unavailable in this environment.", err);},
  width:1280,
  height:720
});
camera.start().catch(function(){});
        })();
    </script>
