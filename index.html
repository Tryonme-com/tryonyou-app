<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TRYONME × DIVINEO — Mirror V10</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: serif; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #pau-bot { position: fixed; bottom: 30px; left: 30px; width: 130px; z-index: 99; border-radius: 50%; border: 1px solid #D4AF37; }
        .legal { position: fixed; bottom: 10px; width: 100%; text-align: center; color: #D4AF37; font-size: 10px; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas"></canvas>
    <div class="legal">SIRET: 94361019600017 | PATENTE: PCT/EP2025/067317 | PARIS</div>
    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#D4AF37', lineWidth: 2});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FFFFFF', lineWidth: 1, radius: 2});
            }
            canvasCtx.restore();
        }
        const pose = new Pose({locateFile: (file) => 'https://cdn.jsdelivr.net/npm/@mediapipe/pose/' + file});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
        pose.onResults(onResults);
        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
        window.addEventListener('resize', () => {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        });
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    </script>
</body>
</html>
