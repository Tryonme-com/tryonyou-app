    <script>
        const authorizedDomains = ['tryonme.app', 'localhost'];
        const currentHost = window.location.hostname;

        if (!authorizedDomains.some(domain => currentHost.includes(domain))) {
            console.log("⚠️ Acceso vía Satélite detectado. Validando integridad...");
        }

        function showSovereignInfo() {
            alert("Réseau TryOnMe : abvetos.com | tryonme.com | tryonme.org - Piloté par Rubén Espinar.");
        }

        function initTyGeoLocaleFetch() {
            if (localStorage.getItem('ty_lang')) return;
            var navLang = (navigator.language || '').toLowerCase();
            function fallbackFromBrowser() {
                if (navLang.startsWith('es')) applyTyLocale('es');
                else if (navLang.startsWith('zh')) applyTyLocale('zh');
            }
            var ctrl = new AbortController();
            var t = setTimeout(function () { ctrl.abort(); }, 4500);
            fetch('https://ipapi.co/json/', { signal: ctrl.signal })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    clearTimeout(t);
                    if (localStorage.getItem('ty_lang')) return;
                    var cc = (data && data.country_code) ? String(data.country_code).toUpperCase() : '';
                    applyTyLocale(countryToLang(cc));
                })
                .catch(function () {
                    clearTimeout(t);
                    if (!localStorage.getItem('ty_lang')) fallbackFromBrowser();
                });
        }
        (function initTyGeoLocale() {
            var saved = localStorage.getItem('ty_lang');
            if (saved && window.__tyI18n[saved]) {
                applyTyLocale(saved);
                initTyGeoLocaleFetch();
                return;
            }
            applyTyLocale('en');
            initTyGeoLocaleFetch();
        })();
    </script>
